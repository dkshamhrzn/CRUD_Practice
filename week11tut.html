<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Diksha's Book Review App</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>
    <div class="container">
        <h2 id="mainTitle">Diksha's Reads</h2>
        <br>
        <table class="table table-striped">
            <tbody id="reviewList">
            </tbody>
        </table>
        <br>
        <hr><br>
        <h2 id="subTitle">Add a Book Review</h2>
        <br>
        <div class="d-flex mb-2">
            <input type="text" class="form-control" id="bookName" placeholder="Book name">
            <select class="form-control mx-2 w-25" id="bookRating">
                <option value="1">1/5</option>
                <option value="2">2/5</option>
                <option value="3">3/5</option>
                <option value="4">4/5</option>
                <option value="5">5/5</option>
            </select>
            <button type="button" class="btn btn-primary" id="addButton">Add</button>
        </div>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"
        integrity="sha256-/JqT3SQfawRcv/BIHPThkBvs0OEvtFFmqPF/lYI/Cxo=" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.5/dist/js/bootstrap.bundle.min.js"></script>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAnalytics } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-analytics.js";
        import {
            getFirestore,
            collection,
            query,
            orderBy,
            onSnapshot,
            addDoc,
            serverTimestamp
        } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyAo2aLTYLB7p3pAQxCoF_JaGUVaYpV7CU7",
            authDomain: "dikshamaharjan2408235.firebaseapp.com",
            projectId: "dikshamaharjan2408235",
            storageBucket: "dikshamaharjan2408235.firebasestorage.app",
            messagingSenderId: "1000127842165",
            appId: "1:1000227835165:web:51c7105156c4ua651f24f5",
            measurementId: "G-RN14F1KXES"
        };

        const app = initializeApp(firebaseConfig);
        const analytics = getAnalytics(app);
        const db = getFirestore(app);

        const q = query(collection(db, "Reviews"), orderBy("book_name"));

        onSnapshot(q, (snapshot) => {
            $('#reviewList').empty();
            let tableRows = '';
            snapshot.forEach((doc) => {
                const data = doc.data();

                tableRows += `<tr>
                        <td>${data.book_name}</td>
                        <td>${data.book_rating}/5</td>
                        <td>${data.review_date? data.review_date.toDate().toLocaleString():" "}</td>
                      </tr>`;
            });
            $('#reviewList').append(tableRows);
        });

        $("#addButton").click(async function () {
            const name = $("#bookName").val().trim();
            const rating = parseInt($("#bookRating").val());

            if (!name) {
                alert("Please enter a book name.");
                return;
            }

            try {
                await addDoc(collection(db, "Reviews"), {
                    book_name: name,
                    book_rating: rating,
                    review_date:serverTimestamp()
                });
                $("#bookName").val('');
                $("#bookRating").val('1');
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Something went wrong while adding your review.");
            }
        });

    </script>
</body>

</html>
